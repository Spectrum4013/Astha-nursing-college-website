<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Your Password — Aastha School of Nursing</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://identitytoolkit.googleapis.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
</head>
<body>
<header class="site-header">
  <div class="wrap header-inner">
    <a href="index.html" class="brand">
      <span class="brand-text">Aastha Nursing</span>
    </a>
  </div>
</header>

<main class="section">
  <div class="wrap auth-wrap">
    <div class="auth-card reveal">
      <p class="eyebrow">First-time Login</p>
      <h2>Set a New Password</h2>
      <p style="margin-bottom:20px; font-size:.9rem;">You're using the default password. Set a new password to continue to your notes — you can't skip this step.</p>
      <div id="msg" class="form-msg error"></div>
      <form id="changeForm">
        <div class="field">
          <label for="newPassword">New Password</label>
          <div class="field-password">
            <input type="password" id="newPassword" autocomplete="new-password" required minlength="8">
            <button type="button" class="pw-toggle">Show</button>
          </div>
          <div class="field-hint">At least 8 characters. Tip: mix uppercase, lowercase, numbers, and a symbol for a stronger password.</div>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="field-password">
            <input type="password" id="confirmPassword" autocomplete="new-password" required minlength="8">
            <button type="button" class="pw-toggle">Show</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Set Password &amp; Continue to Notes</button>
      </form>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const form = document.getElementById('changeForm');
const msgEl = document.getElementById('msg');
setupPasswordToggles();

function showError(text){
  msgEl.classList.remove('success');
  msgEl.classList.add('error', 'show');
  msgEl.textContent = text;
}

let currentRoll = null;

auth.onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = 'student-login.html';
    return;
  }
  currentRoll = emailToRoll(user.email);
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msgEl.classList.remove('show');

  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (newPassword !== confirmPassword) { showError('Passwords do not match.'); return; }

  const check = checkPasswordStrength(newPassword);
  if (!check.valid) { showError(check.message); return; }

  try {
    await auth.currentUser.updatePassword(newPassword);
    await db.collection('students').doc(currentRoll).update({ mustChangePassword: false });
    window.location.href = 'notes.html';
  } catch (err) {
    if (err.code === 'auth/requires-recent-login') {
      showError('Session expired — please log in again and retry.');
      setTimeout(() => { auth.signOut(); window.location.href = 'student-login.html'; }, 2000);
    } else {
      showError('Something went wrong. Please try again.');
    }
  }
});
</script>
<script src="script.js"></script>
</body>
</html>
