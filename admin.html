<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Aastha School of Nursing</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://identitytoolkit.googleapis.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
</head>
<body>
<header class="site-header">
  <div class="wrap header-inner">
    <a href="index.html" class="brand">
      <span class="brand-text">Aastha Nursing</span>
    </a>
    <nav class="simple-nav">
      <span class="logout-link" id="logoutBtn" style="color:#fff;">Log Out</span>
    </nav>
  </div>
</header>

<main class="section" id="dashboardView" style="display:none;">
  <div class="wrap">
    <p class="eyebrow">Admin Dashboard</p>
    <h2>Manage Students</h2>

    <div class="admin-toolbar">
      <input type="text" id="searchBox" class="admin-search" placeholder="Search roll number...">
      <div class="admin-add">
        <input type="text" id="newRoll" placeholder="New roll number">
        <button id="addStudentBtn" class="btn btn-primary">+ Add Student</button>
      </div>
    </div>
    <div id="adminMsg" class="form-msg error"></div>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Roll Number</th>
          <th>Access</th>
          <th>Password</th>
          <th>Added</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="studentTableBody">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<main class="section" id="checkingView">
  <div class="wrap">
    <p style="color:rgba(255,255,255,.7);">Checking access...</p>
  </div>
</main>

<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <h3>Delete this student?</h3>
    <p>This permanently removes <strong id="deleteRollLabel"></strong> from the system and blocks their login. This can't be undone. Type the roll number below to confirm.</p>
    <div class="field">
      <input type="text" id="deleteConfirmInput" placeholder="Type roll number to confirm" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="deleteCancelBtn">Cancel</button>
      <button class="btn btn-danger" id="deleteConfirmBtn" disabled>Delete Student</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const dashboardView = document.getElementById('dashboardView');
const checkingView = document.getElementById('checkingView');
const adminMsg = document.getElementById('adminMsg');

let allStudents = [];

function showAdminError(text){
  adminMsg.textContent = text;
  adminMsg.classList.add('show');
  setTimeout(() => adminMsg.classList.remove('show'), 4000);
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await auth.signOut();
  window.location.href = 'student-login.html';
});

auth.onAuthStateChanged((user) => {
  checkingView.style.display = 'none';
  if (user && user.email === ADMIN_EMAIL) {
    dashboardView.style.display = '';
    loadStudents();
  } else {
    // Not logged in as admin — send to the shared login page
    window.location.href = 'student-login.html';
  }
});

async function loadStudents(){
  try {
    const snap = await db.collection('students').orderBy('dateAdded', 'desc').get();
    allStudents = snap.docs.map(d => ({ roll: d.id, ...d.data() }));
    renderTable(allStudents);
  } catch (err) {
    console.error('Load students failed:', err);
    document.getElementById('studentTableBody').innerHTML =
      '<tr><td colspan="5">Could not load students — ' + err.message + '</td></tr>';
  }
}

function renderTable(list){
  const tbody = document.getElementById('studentTableBody');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5">No students added yet.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(s => {
    const statusPill = s.active === false
      ? '<span class="status-pill status-revoked">Revoked</span>'
      : '<span class="status-pill status-active">Active</span>';
    const pwPill = s.mustChangePassword
      ? '<span class="status-pill status-pending">Default</span>'
      : '<span class="status-pill status-active">Set</span>';
    const dateStr = s.dateAdded && s.dateAdded.toDate ? s.dateAdded.toDate().toLocaleDateString() : '—';
    const toggleLabel = s.active === false ? 'Restore Access' : 'Revoke Access';
    return `<tr>
      <td><strong>${s.roll}</strong></td>
      <td>${statusPill}</td>
      <td>${pwPill}</td>
      <td>${dateStr}</td>
      <td style="display:flex; gap:8px; align-items:center;">
        <button class="toggle-btn" onclick="toggleAccess('${s.roll}', ${s.active === false})">${toggleLabel}</button>
        <div class="row-menu">
          <button class="row-menu-btn" onclick="toggleRowMenu(this)">⋮</button>
          <div class="row-menu-dropdown">
            <button onclick="openDeleteModal('${s.roll}')">Delete Student</button>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

document.getElementById('searchBox').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  renderTable(allStudents.filter(s => s.roll.toLowerCase().includes(q)));
});

async function toggleAccess(roll, makeActive){
  await db.collection('students').doc(roll).update({ active: makeActive });
  await loadStudents();
}

// ---- Row three-dot menu ----
function toggleRowMenu(btn){
  const dropdown = btn.nextElementSibling;
  const wasOpen = dropdown.classList.contains('open');
  document.querySelectorAll('.row-menu-dropdown.open').forEach(d => d.classList.remove('open'));
  if (!wasOpen) dropdown.classList.add('open');
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.row-menu')) {
    document.querySelectorAll('.row-menu-dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

// ---- Delete confirmation modal ----
const deleteModal = document.getElementById('deleteModal');
const deleteRollLabel = document.getElementById('deleteRollLabel');
const deleteConfirmInput = document.getElementById('deleteConfirmInput');
const deleteConfirmBtn = document.getElementById('deleteConfirmBtn');
const deleteCancelBtn = document.getElementById('deleteCancelBtn');
let rollPendingDelete = null;

function openDeleteModal(roll){
  document.querySelectorAll('.row-menu-dropdown.open').forEach(d => d.classList.remove('open'));
  rollPendingDelete = roll;
  deleteRollLabel.textContent = roll;
  deleteConfirmInput.value = '';
  deleteConfirmBtn.disabled = true;
  deleteModal.classList.add('open');
  deleteConfirmInput.focus();
}
function closeDeleteModal(){
  deleteModal.classList.remove('open');
  rollPendingDelete = null;
}
deleteCancelBtn.addEventListener('click', closeDeleteModal);
deleteModal.addEventListener('click', (e) => {
  if (e.target === deleteModal) closeDeleteModal();
});
deleteConfirmInput.addEventListener('input', () => {
  deleteConfirmBtn.disabled = deleteConfirmInput.value.trim() !== rollPendingDelete;
});
deleteConfirmBtn.addEventListener('click', async () => {
  if (deleteConfirmInput.value.trim() !== rollPendingDelete) return;
  deleteConfirmBtn.disabled = true;
  deleteConfirmBtn.textContent = 'Deleting...';
  try {
    await db.collection('students').doc(rollPendingDelete).delete();
    closeDeleteModal();
    await loadStudents();
  } catch (err) {
    showAdminError('Could not delete: ' + err.message);
  } finally {
    deleteConfirmBtn.textContent = 'Delete Student';
  }
});

document.getElementById('addStudentBtn').addEventListener('click', async () => {
  const rollInput = document.getElementById('newRoll');
  const roll = rollInput.value.trim();
  if (!roll) { showAdminError('Enter a roll number.'); return; }

  let secondaryApp;
  try {
    const existing = await db.collection('students').doc(roll).get();
    if (existing.exists) { showAdminError('That roll number already exists.'); return; }

    const email = rollToEmail(roll);
    // Use a secondary, throwaway Firebase app instance so creating this user
    // doesn't sign the admin out of their own session.
    secondaryApp = firebase.initializeApp(firebaseConfig, 'Secondary-' + Date.now());
    await secondaryApp.auth().createUserWithEmailAndPassword(email, DEFAULT_PASSWORD);
    await secondaryApp.auth().signOut();
    await db.collection('students').doc(roll).set({
      active: true,
      mustChangePassword: true,
      dateAdded: firebase.firestore.FieldValue.serverTimestamp()
    });
    rollInput.value = '';
    await loadStudents();
  } catch (err) {
    console.error('Add student failed:', err);
    if (err.code === 'auth/email-already-in-use') {
      showAdminError('That roll number already has an account.');
    } else if (err.code === 'permission-denied') {
      showAdminError('Permission denied — the Firestore security rules may not be published yet.');
    } else {
      showAdminError('Something went wrong: ' + err.message);
    }
  } finally {
    if (secondaryApp) await secondaryApp.delete();
  }
});
</script>
<script src="script.js"></script>
</body>
</html>
