<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aastha School of Nursing mark">
  <title>Aastha School of Nursing</title>
  <rect width="80" height="80" rx="18" fill="#B7302A"/>

  <!-- stethoscope: parallel earpieces entering from the right, merging into one tube -->
  <path d="M72 16 L48 38" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <path d="M72 26 L52 44" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <path d="M48 38 L44 44 L44 52" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="44" cy="58" r="6" fill="#FFFFFF"/>
  <circle cx="44" cy="58" r="2.2" fill="#B7302A"/>

  <!-- medical cross -->
  <path d="M14 26 H26 V14 H36 V26 H48 V36 H36 V48 H26 V36 H14 Z" fill="#FFFFFF"/>
